<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const path = window.location.pathname;
      window.location.replace(
        window.location.origin + "/?p=" + encodeURIComponent(path),
      );
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected, click <a href="/">here</a>.</p>
  </body>
</html>
