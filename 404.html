<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var path = window.location.pathname;
        var base = "/";

        window.location.replace(
          base + "?p=" + encodeURIComponent(path)
        );
      })();
    </script>
  </head>
  <body></body>
</html>
